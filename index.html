<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">Memuat Undangan...</title>
    
    <meta property="og:title" id="meta-og-title" content="Undangan Resmi">
    <meta property="og:description" id="meta-og-desc" content="Mengharap kehadiran Bapak/Ibu dalam acara resmi sekolah.">
    <meta property="og:image" id="meta-og-img" content="">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ========================================== */
        /* 1. INITIAL SETUP & ATHALIA IDENTITY        */
        /* ========================================== */
        :root {
            --navy: #0B315B;
            --gold: #C5A059;
            --bg-light: #F8FAFC;
            --slate: #475569;
            --white: #FFFFFF;
            --border: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #334155; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .phone-wrapper { 
            width: 100%; 
            max-width: 450px; 
            background-color: var(--bg-light); 
            min-height: 100vh; 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            overflow: hidden; 
        }

        .lock-scroll { overflow: hidden; height: 100vh; }

        /* ========================================== */
        /* 2. COVER / OPENING GATE                    */
        /* ========================================== */
        .full-screen-cover {
            position: fixed; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            max-width: 450px; 
            height: 100vh; 
            z-index: 999; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            padding: 50px 24px 60px 24px; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
            background-color: var(--navy);
            box-sizing: border-box;
        }

        .bg-video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
        }

        .video-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(180deg, rgba(11, 49, 91, 0.6) 0%, rgba(11, 49, 91, 0.4) 40%, rgba(11, 49, 91, 0.85) 100%); 
            z-index: 2; 
        }

        .cover-content { position: relative; z-index: 3; width: 100%; }

        .shine-text-cover { 
            font-family: 'Lora', serif; 
            font-weight: 600; 
            background: linear-gradient(135deg, #FFFFFF 0%, #E2E8F0 50%, var(--gold) 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 4px 12px rgba(0,0,0,0.3); 
        }

        .gate-button-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-enter-gate {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
            animation: pulse-border 2s infinite;
        }

        .gate-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 14px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .ripple-circle {
            position: absolute;
            top: 27px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            z-index: 1;
            animation: ripple-out 2s infinite linear;
            pointer-events: none;
        }

        .ripple-2 { animation-delay: 0.8s; }

        @keyframes ripple-out {
            0% { width: 54px; height: 54px; opacity: 0.8; }
            100% { width: 110px; height: 110px; opacity: 0; }
        }

        @keyframes pulse-border {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* ========================================== */
        /* 3. MAIN CONTENT STYLES                     */
        /* ========================================== */
        section { padding: 40px 24px; position: relative; }
        
        .motto-tag { 
            display: inline-block; 
            font-size: 9px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--gold); 
            font-weight: 700; 
            margin-bottom: 8px; 
        }

        .shine-text { 
            font-family: 'Lora', serif; 
            color: var(--navy); 
            font-size: 20px; 
            line-height: 1.3; 
        }

        /* CARD EVENT & MAPS */
        .event-card { 
            background: var(--white); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            border: 1px solid var(--border); 
            text-align: left; 
        }

        .event-card h3 { color: var(--navy); font-size: 15px; margin-bottom: 6px; }
        .event-card p { font-size: 12px; color: var(--slate); margin-bottom: 4px; }

        .btn-action { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            width: 100%; 
            padding: 12px; 
            background-color: var(--navy); 
            color: var(--white); 
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 600; 
            margin-top: 12px; 
            transition: all 0.2s; 
        }

        /* ANIMATIONS */
        .animate-up { opacity: 0; transform: translateY(20px); transition: all 0.8s ease; }
        .animate-up.show { opacity: 1; transform: translateY(0); }
        .delay-100 { transition-delay: 0.1s; }
        .delay-200 { transition-delay: 0.2s; }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--navy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AGENDA LIST STYLE */
        .agenda-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .agenda-item { 
            display: flex; 
            align-items: flex-start; 
            gap: 12px; 
            padding: 12px; 
            background: rgba(255,255,255,0.7); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            text-align: left;
        }
        .agenda-time { 
            background: var(--navy); 
            color: var(--white); 
            font-size: 11px; 
            font-weight: 600; 
            padding: 6px 10px; 
            border-radius: 6px; 
            white-space: nowrap; 
        }
        .agenda-details h4 { font-size: 13px; color: var(--navy); margin-bottom: 2px; }
        .agenda-details p { font-size: 11px; color: var(--slate); margin: 0; }

        /* SPEAKER & PRESENTER CARD STYLES */
        .speaker-card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            gap: 16px;
            align-items: center;
            text-align: left;
        }

        .speaker-avatar {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--gold);
            flex-shrink: 0;
        }

        .speaker-info h4 { color: var(--navy); font-size: 14px; margin-bottom: 2px; }
        .speaker-info .speaker-title { color: var(--gold); font-size: 11px; font-weight: 600; margin-bottom: 6px; }
        .speaker-info p { color: var(--slate); font-size: 11px; line-height: 1.4; }

        /* FAQ ACCORDION STYLES */
        .faq-item {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            overflow: hidden;
            text-align: left;
        }

        .faq-question {
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--navy);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .faq-answer {
            padding: 0 16px 14px 16px;
            font-size: 12px;
            color: var(--slate);
            line-height: 1.5;
            display: none;
        }

        .faq-item.active .faq-answer { display: block; }
        .faq-item.active .faq-icon { transform: rotate(180deg); }
        .faq-icon { transition: transform 0.3s ease; color: var(--gold); }

        /* DRESSCODE & KETENTUAN BOX */
        .info-box {
            background: #EFF6FF;
            border-left: 4px solid var(--navy);
            padding: 14px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 16px;
            text-align: left;
        }
        .info-box h4 { font-size: 12px; color: var(--navy); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .info-box p { font-size: 11px; color: #1E40AF; margin: 0; }

        /* GALLERY GRID STYLE */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* ========================================== */
        /* 7. AUDIO BUTTON (POJOK KIRI ATAS PRESISI)  */
        /* ========================================== */
        .audio-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; z-index: 1000; display: flex; justify-content: flex-start; padding-left: 20px; pointer-events: none; }
        .btn-audio { pointer-events: auto; background: rgba(11, 49, 91, 0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: var(--white); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer; transition: all 0.3s ease; }
        .btn-audio:active { transform: scale(0.9); }

        /* ========================================== */
        /* 8. TIMELINE CAROUSEL SLIDER STYLE          */
        /* ========================================== */
        .timeline-carousel { position: relative; width: 100%; overflow: hidden; border-radius: 12px; margin-top: 10px; }
        .slides-container { display: flex; transition: transform 0.4s ease-in-out; width: 100%; }
        .slide { min-width: 100%; box-sizing: border-box; opacity: 0; transition: opacity 0.4s ease-in-out; display: none; }
        .slide.active { opacity: 1; display: block; }
        
        .carousel-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 8px; z-index: 5; pointer-events: none; }
        .nav-btn { pointer-events: auto; background: rgba(11, 49, 91, 0.6); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; backdrop-filter: blur(4px); }
        .dots-container { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background-color: #cbd5e1; cursor: pointer; transition: all 0.3s ease; }
        .dot.active { background-color: var(--navy); transform: scale(1.2); }
    </style>
</head>
<body class="lock-scroll">

<audio id="bg-music" loop preload="auto">
    <source id="audio-source" src="" type="audio/mpeg">
</audio>

<div class="audio-container">
    <button class="btn-audio" id="btn-audio-toggle" onclick="toggleAudio()">
        <i class="fa-solid fa-volume-xmark" id="audio-icon"></i>
    </button>
</div>

<div class="phone-wrapper">

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="color: #64748b; font-weight: 500;">Menyiapkan Undangan Digital...</p>
    </div>

    <div id="welcome-gate" class="full-screen-cover" onclick="bukaUndanganDigital()">
        <video id="bg-video" class="bg-video" playsinline autoplay muted loop>
            <source id="video-source" src="" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        
        <div class="cover-content animate-up">
            <img id="logo-top" src="" style="width: 75px; height: auto; display: block; margin: 0 auto 12px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.4));" alt="Logo">
            
            <p id="sub-judul-1" style="color: rgba(255,255,255,0.7); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px;"></p>
            <p id="sub-judul-2" style="color: rgba(255,255,255,0.7); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px;"></p>
            
            <h1 id="judul-opening" class="shine-text-cover" style="font-size: 26px; line-height: 1.2;"></h1>
        </div>

        <div class="cover-content animate-up delay-100" style="background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); max-width: 320px;">
            <p style="color: #cbd5e1; font-size: 9.5px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;">Kepada Yth. Bapak/Ibu</p>
            <h3 style="color: white; font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif;" id="tamu-nama-cover">Orang Tua / Wali Murid</h3>
        </div>

        <div class="cover-content animate-up delay-200 gate-button-wrapper">
            <div class="ripple-circle ripple-1"></div>
            <div class="ripple-circle ripple-2"></div>
            <button class="btn-enter-gate">
                <i class="fa-solid fa-play"></i>
            </button>
            <div class="gate-text">Ketuk Di Mana Saja Untuk Masuk</div>
        </div>
    </div>

    <section style="text-align: center; border-radius: 24px 24px 0 0; padding-top: 55px; background-image: url('https://www.transparenttextures.com/patterns/watercolor-paper.png');">
        <div class="animate-up">
            <span class="motto-tag">MOMENTUM ACARA</span>
            <h2 class="shine-text" id="motto-title"></h2>
            <p id="motto-desc" style="margin: 15px 0 20px; font-size: 14px; color: var(--slate); padding: 0 10px;"></p>
            
            <div class="info-box">
                <h4><i class="fa-solid fa-shirt"></i> Ketentuan Busana (Dresscode)</h4>
                <p id="dresscode-text">Bebas, Rapi, dan Sopan.</p>
            </div>
        </div>
    </section>

    <div id="dynamic-sheet-content"></div>

    <footer style="background-color: var(--navy); color: var(--white); text-align: center; padding: 30px 20px; font-size: 11px;">
        <img id="logo-footer" src="" style="width: 50px; height: auto; margin-bottom: 12px; opacity: 0.8;" alt="Logo Footer">
        <p style="opacity: 0.8; font-weight: 600;" id="footer-school-name">Sekolah Athalia</p>
        <p style="opacity: 0.5; margin-top: 4px; font-size: 10px;" id="footer-address">Regency Melati Mas Blok J6, Serpong Utara</p>
        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); opacity: 0.4; font-size: 9px;">
            &copy; <span id="year-copy">2026</span> - Official Digital Invitation System
        </div>
    </footer>

</div>

<script>
    // =========================================================================
    // 1. DYNAMIC CONFIGURATION & INTEGRATION CONTROLLER
    // =========================================================================
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event') || 'PSB-SD-2026';
    
    // GANTI LINK SCRIPT GOOGLE WEB APP DI SINI (Keluaran dari Google Apps Script Deploy):
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwPq1I4S0YlUeU_Z-aL7vNq9C42O7IAtR_h-K5x4mX8N2aUuC-b3vQ28C7/exec'; 

    function loadDigitalInvitation() {
        const fetchUrl = `${GAS_ENDPOINT}?action=getInvitationData&eventId=${encodeURIComponent(eventId)}`;
        
        fetch(fetchUrl)
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    applyConfig(res.config);
                    renderDynamicSections(res.sections);
                    
                    // Sembunyikan loading screen
                    const loader = document.getElementById('loading-screen');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 500);
                    }
                } else {
                    console.error("Gagal memuat data dari Spreadsheet:", res.message);
                }
            })
            .catch(err => {
                console.error("Terjadi error koneksi ke Apps Script:", err);
                const loader = document.getElementById('loading-screen');
                if(loader) loader.style.display = 'none';
            });
    }

    // =========================================================================
    // 2. RENDER DYNAMIC SECTIONS DARI GOOGLE SHEET
    // =========================================================================
    function renderDynamicSections(sections) {
        const wrapper = document.getElementById('dynamic-sheet-content');
        if(!wrapper || !sections) return;

        let html = '';

        sections.forEach(sec => {
            if(!sec.isActive) return;

            // SECTION TYPE: AGENDA / TIMELINE ACARA
            if(sec.sectionType === 'AGENDA') {
                html += `
                <section style="background: var(--white);">
                    <div class="animate-up">
                        <span class="motto-tag">${sec.subtitle || 'SUSUNAN ACARA'}</span>
                        <h2 class="shine-text">${sec.title || 'Agenda Utama'}</h2>
                        <div class="agenda-list">`;
                
                if(sec.items && sec.items.length > 0) {
                    sec.items.forEach(item => {
                        html += `
                        <div class="agenda-item">
                            <div class="agenda-time">${item.waktu || ''}</div>
                            <div class="agenda-details">
                                <h4>${item.judulAgenda || ''}</h4>
                                <p>${item.deskripsiAgenda || ''}</p>
                            </div>
                        </div>`;
                    });
                }

                html += `</div></div></section>`;
            }

            // SECTION TYPE: LOKASI & MAPS
            else if(sec.sectionType === 'LOKASI') {
                html += `
                <section style="background: var(--bg-light);">
                    <div class="animate-up">
                        <span class="motto-tag">${sec.subtitle || 'TEMPAT & WAKTU'}</span>
                        <h2 class="shine-text">${sec.title || 'Lokasi Pelaksanaan'}</h2>
                        <p style="font-size: 12px; color: var(--slate); margin-top: 4px; margin-bottom: 16px;">${sec.description || ''}</p>
                        
                        <div class="event-card">
                            <h3><i class="fa-solid fa-location-dot" style="color: var(--gold); margin-right: 6px;"></i> ${sec.namaTempat || 'Gedung Sekolah Athalia'}</h3>
                            <p><i class="fa-regular fa-clock" style="margin-right: 4px;"></i> ${sec.waktuLengkap || ''}</p>
                            <p style="margin-top: 8px;">${sec.alamatLengkap || ''}</p>
                            
                            ${sec.linkGoogleMaps ? `<a href="${sec.linkGoogleMaps}" target="_blank" class="btn-action"><i class="fa-solid fa-map-location-dot"></i> Buka Google Maps</a>` : ''}
                        </div>
                    </div>
                </section>`;
            }

            // SECTION TYPE: PEMBICARA / NARASUMBER
            else if(sec.sectionType === 'PEMBICARA') {
                html += `
                <section style="background: var(--white);">
                    <div class="animate-up">
                        <span class="motto-tag">${sec.subtitle || 'NARASUMBER'}</span>
                        <h2 class="shine-text">${sec.title || 'Pembicara Spesial'}</h2>
                        <div style="margin-top: 15px;">`;

                if(sec.items && sec.items.length > 0) {
                    sec.items.forEach(spk => {
                        html += `
                        <div class="speaker-card">
                            ${spk.fotoUrl ? `<img src="${spk.fotoUrl}" class="speaker-avatar" alt="${spk.nama}">` : ''}
                            <div class="speaker-info">
                                <h4>${spk.nama || ''}</h4>
                                <div class="speaker-title">${spk.jabatan || ''}</div>
                                <p>${spk.topikMateri || ''}</p>
                            </div>
                        </div>`;
                    });
                }

                html += `</div></div></section>`;
            }

            // SECTION TYPE: FAQ / TANYA JAWAB
            else if(sec.sectionType === 'FAQ') {
                html += `
                <section style="background: var(--bg-light);">
                    <div class="animate-up">
                        <span class="motto-tag">${sec.subtitle || 'TANYA JAWAB'}</span>
                        <h2 class="shine-text">${sec.title || 'Informasi Penting (FAQ)'}</h2>
                        <div style="margin-top: 15px;">`;

                if(sec.items && sec.items.length > 0) {
                    sec.items.forEach(faq => {
                        html += `
                        <div class="faq-item" onclick="toggleFaq(this)">
                            <div class="faq-question">
                                <span>${faq.pertanyaan || ''}</span>
                                <i class="fa-solid fa-chevron-down faq-icon"></i>
                            </div>
                            <div class="faq-answer">${faq.jawaban || ''}</div>
                        </div>`;
                    });
                }

                html += `</div></div></section>`;
            }

            // SECTION TYPE: GALERI / CAROUSEL SLIDER
            else if(sec.sectionType === 'GALERI') {
                html += `
                <section style="background: var(--white);">
                    <div class="animate-up">
                        <span class="motto-tag">${sec.subtitle || 'DOKUMENTASI'}</span>
                        <h2 class="shine-text">${sec.title || 'Galeri Acara'}</h2>
                        
                        <div class="timeline-carousel">
                            <div class="slides-container">`;

                if(sec.items && sec.items.length > 0) {
                    sec.items.forEach((img, idx) => {
                        html += `
                        <div class="slide ${idx === 0 ? 'active' : ''}">
                            <img src="${img.fotoUrl}" style="width: 100%; border-radius: 12px; height: 220px; object-fit: cover;" alt="Galeri">
                            ${img.caption ? `<p style="font-size: 11px; color: var(--slate); margin-top: 6px;">${img.caption}</p>` : ''}
                        </div>`;
                    });
                }

                html += `
                            </div>
                            <div class="carousel-nav">
                                <button class="nav-btn prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
                                <button class="nav-btn next-btn"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="dots-container">`;

                if(sec.items && sec.items.length > 0) {
                    sec.items.forEach((_, idx) => {
                        html += `<div class="dot ${idx === 0 ? 'active' : ''}"></div>`;
                    });
                }

                html += `</div></div></section>`;
            }
        });

        wrapper.innerHTML = html;
        
        // Re-inisialisasi slider & animasi setelah elemen dinamis dibuat
        initSliders();
    }

    // =========================================================================
    // 3. TERAPKAN KONFIGURASI KE TAMPILAN HTML
    // =========================================================================
    function applyConfig(config) {
        // Browser Meta Title & Tags
        document.title = config.judulEvent || "Official Invitation";
        if(document.getElementById("web-title")) document.getElementById("web-title").innerText = config.judulEvent || "Official Invitation";
        if(document.getElementById("meta-og-title")) document.getElementById("meta-og-title").setAttribute("content", config.judulEvent || "Official Invitation");
        if(document.getElementById("meta-og-desc")) document.getElementById("meta-og-desc").setAttribute("content", config.subtitleEvent || "");
        if(document.getElementById("meta-og-img")) document.getElementById("meta-og-img").setAttribute("content", config.logoCoverUrl || "");

        // Media Aset (Lagu & Video)
        if(document.getElementById("audio-source")) {
            var audioUrl = config.audioLatarUrl || "";
            document.getElementById("audio-source").src = audioUrl;
            var bgMusic = document.getElementById("bg-music");
            if (bgMusic) {
                bgMusic.src = audioUrl;
                bgMusic.load();
            }
        }
        if(document.getElementById("video-source")) {
            document.getElementById("video-source").src = config.videoLatarCoverUrl || "";
            document.getElementById("bg-video").load();
        }

        // Element Halaman Depan (Opening Gate)
        if(document.getElementById("logo-top")) document.getElementById("logo-top").src = config.logoCoverUrl || "";
        if(document.getElementById("sub-judul-1")) document.getElementById("sub-judul-1").innerText = config.judulEvent || "";
        if(document.getElementById("sub-judul-2")) document.getElementById("sub-judul-2").innerText = config.subtitleEvent || "";
        if(document.getElementById("judul-opening")) document.getElementById("judul-opening").innerHTML = config.judulCoverUtama || "";
        
        // Prioritaskan nama tamu dari URL (?to=)
        const namaTamuFromUrl = urlParams.get('to');
        if(document.getElementById("tamu-nama-cover")) {
            document.getElementById("tamu-nama-cover").innerText = namaTamuFromUrl || config.kepadaYth || "Orang Tua / Wali Murid";
        }

        // Element Halaman Isi
        if(document.getElementById("motto-title")) document.getElementById("motto-title").innerText = config.judulSambutan || "";
        if(document.getElementById("motto-desc")) document.getElementById("motto-desc").innerText = config.teksSambutan || "";
        if(document.getElementById("dresscode-text")) document.getElementById("dresscode-text").innerText = config.dresscode || "Bebas, Rapi, dan Sopan.";

        // Element Footer
        if(document.getElementById("logo-footer")) document.getElementById("logo-footer").src = config.logoCoverUrl || "";
        if(document.getElementById("footer-school-name")) document.getElementById("footer-school-name").innerText = config.namaSekolah || "Sekolah Athalia";
        if(document.getElementById("footer-address")) document.getElementById("footer-address").innerText = config.alamatSekolah || "Regency Melati Mas Blok J6, Serpong Utara";
        if(document.getElementById("year-copy")) document.getElementById("year-copy").innerText = new Date().getFullYear();
    }

    // =========================================================================
    // 4. FAQ ACCORDION INTERACTION
    // =========================================================================
    function toggleFaq(element) {
        element.classList.toggle('active');
    }

    // =========================================================================
    // 5. OBSERVER UNTUK ANIMASI SCROLL
    // =========================================================================
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('show');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.animate-up').forEach((el) => observer.observe(el));

    // =========================================================================
    // 6. AUDIO & COVER GATE CONTROLLER
    // =========================================================================
    var audio = document.getElementById("bg-music");
    var audioIcon = document.getElementById("audio-icon");
    if (audio) audio.volume = 0.7; 

    function toggleAudio() {
        if (!audio) return;
        if (audio.paused) {
            audio.play().then(function() {
                if(audioIcon) audioIcon.className = "fa-solid fa-volume-high";
            }).catch(function(err) {
                console.log("Gagal memutar audio:", err);
                if(audioIcon) audioIcon.className = "fa-solid fa-volume-xmark";
            });
        } else {
            audio.pause();
            if(audioIcon) audioIcon.className = "fa-solid fa-volume-xmark";
        }
    }

    function bukaUndanganDigital() {
        var gate = document.getElementById("welcome-gate");
        document.body.classList.remove("lock-scroll"); 
        
        // Putar audio secara langsung saat tombol/cover diklik
        if (audio && audio.paused) {
            audio.play().then(function() {
                if(audioIcon) audioIcon.className = "fa-solid fa-volume-high";
            }).catch(function(err) {
                console.log("Autoplay diblokir browser:", err);
            });
        }

        if (gate) {
            gate.style.opacity = "0";
            gate.style.transform = "translateY(-100%)";
            
            setTimeout(function() {
                gate.style.display = "none";
                var elements = document.querySelectorAll('.animate-up');
                elements.forEach(function(el) {
                    el.classList.add('show');
                });
            }, 1000);
        }
    }

    function initSliders() {
        var cards = document.querySelectorAll('.timeline-carousel');
        cards.forEach(function(card) {
            var slides = card.querySelectorAll('.slide');
            var dots = card.parentElement.querySelectorAll('.dot');
            var prevBtn = card.querySelector('.prev-btn');
            var nextBtn = card.querySelector('.next-btn');
            var currentSlide = 0;
            
            if(slides.length === 0) return;

            function showSlide(index) {
                slides[currentSlide].classList.remove('active');
                if (dots.length > 0) dots[currentSlide].classList.remove('active');
                
                currentSlide = (index + slides.length) % slides.length;
                
                slides[currentSlide].classList.add('active');
                if (dots.length > 0) dots[currentSlide].classList.add('active');
            }
            
            if(nextBtn) {
                nextBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showSlide(currentSlide + 1);
                });
            }
            
            if(prevBtn) {
                prevBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showSlide(currentSlide - 1);
                });
            }
            
            dots.forEach(function(dot, dotIdx) {
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showSlide(dotIdx);
                });
            });
        });
    }

    // Inisialisasi awal saat halaman dimuat
    window.addEventListener('DOMContentLoaded', function() {
        loadDigitalInvitation();
        
        var coverElements = document.querySelectorAll('#welcome-gate .animate-up');
        coverElements.forEach(function(el) {
            el.classList.add('show');
        });
    });
</script>
</body>
